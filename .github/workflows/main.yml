name: Auto Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout Latest Code
      uses: actions/checkout@v4

    - name: Create Temp Folder On App Server
      run: |
        ssh -i ~/.ssh/mykey.pem -o StrictHostKeyChecking=no ubuntu@98.81.219.151 "
        mkdir -p /home/ubuntu/appdeploy
        "

    - name: Copy Files To Temp Folder
      run: |
        rsync -avz --delete \
        -e "ssh -i ~/.ssh/mykey.pem -o StrictHostKeyChecking=no" \
        ./ ubuntu@98.81.219.151:/home/ubuntu/appdeploy/

    - name: Move Files To Web Root
      run: |
        ssh -i ~/.ssh/mykey.pem -o StrictHostKeyChecking=no ubuntu@98.81.219.151 "
        sudo rm -rf /var/www/html/* &&
        sudo cp -r /home/ubuntu/appdeploy/* /var/www/html/
        "

    - name: Set Permissions
      run: |
        ssh -i ~/.ssh/mykey.pem -o StrictHostKeyChecking=no ubuntu@98.81.219.151 "
        sudo chown -R www-data:www-data /var/www/html &&
        sudo chmod -R 775 /var/www/html
        "

    - name: Restart Apache2
      run: |
        ssh -i ~/.ssh/mykey.pem -o StrictHostKeyChecking=no ubuntu@98.81.219.151 "
        sudo systemctl restart apache2
        "
